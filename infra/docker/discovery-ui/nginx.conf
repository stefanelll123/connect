worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';

    access_log  /var/log/nginx/access.log  main;

    sendfile           on;
    keepalive_timeout  65;

    # Disable server token (hide nginx version)
    server_tokens  off;

    # Gzip compression
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/javascript
                      application/json application/x-javascript
                      text/xml application/xml image/svg+xml;

    server {
        listen       8080;
        server_name  _;

        root   /usr/share/nginx/html;
        index  index.html;

        # Security headers
        add_header X-Frame-Options              "DENY"                    always;
        add_header X-Content-Type-Options       "nosniff"                 always;
        add_header X-XSS-Protection             "1; mode=block"           always;
        add_header Referrer-Policy              "no-referrer"             always;
        add_header Permissions-Policy           "geolocation=()"          always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';"
            always;

        # SPA routing — all 404s fall back to index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache immutable static assets (hashed filenames from Vite)
        location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # No directory listing
        autoindex off;

        # Block access to hidden files
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
