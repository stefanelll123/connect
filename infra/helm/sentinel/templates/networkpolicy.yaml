apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sentinel-node.fullname" . }}
  labels:
    {{- include "sentinel-node.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "sentinel-node.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from Ingress Controller (for UI)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8080
    # Allow from other Sentinels in the same mesh
    - from:
        - podSelector:
            matchLabels:
              role: sentinel
      ports:
        - port: 8080
  egress:
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow to Discovery Service
    - ports:
        - port: 8000
    # Allow to producer backend (consumer mode)
    - ports:
        - port: 443
        - port: 80
    # Allow to Vault
    - ports:
        - port: 8200
    # Allow to OTel Collector
    - ports:
        - port: 4317
        - port: 4318
