receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  memory_limiter:
    limit_mib: 512
    spike_limit_mib: 128
    check_interval: 5s

  batch:
    send_batch_size: 10000
    timeout: 5s

  resource:
    attributes:
      - action: insert
        key: cluster
        value: ${env:CLUSTER_NAME}
      - action: insert
        key: environment
        value: ${env:DEPLOYMENT_ENVIRONMENT}

  # Kubernetes resource attributes
  k8sattributes:
    auth_type: serviceAccount
    passthrough: false
    filter:
      node_from_env_var: KUBE_NODE_NAME
    extract:
      metadata:
        - k8s.pod.name
        - k8s.pod.uid
        - k8s.deployment.name
        - k8s.namespace.name
        - k8s.node.name
        - k8s.pod.start_time
      labels:
        - tag_name: app
          key: app.kubernetes.io/name
          from: pod
        - tag_name: service_id
          key: sentinel.io/service-id
          from: pod
    pod_association:
      - sources:
          - from: resource_attribute
            name: k8s.pod.ip
      - sources:
          - from: connection

exporters:
  # Prometheus pull endpoint
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: sentinel
    const_labels:
      cluster: ${env:CLUSTER_NAME}
    enable_open_metrics: true

  # Traces → Tempo
  otlp/tempo:
    endpoint: "tempo:4317"
    tls:
      insecure: true

  # Logs → Loki
  loki:
    endpoint: "http://loki:3100/loki/api/v1/push"
    default_labels_enabled:
      exporter: false
      job: true
    labels:
      attributes:
        service.name: "service_name"
        service_id: "service_id"
        env: "env"
        level: "level"
        event: "event"

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"
  pprof:
    endpoint: "0.0.0.0:1777"
  zpages:
    endpoint: "0.0.0.0:55679"

service:
  extensions: [health_check, pprof, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, k8sattributes, batch]
      exporters: [otlp/tempo]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, k8sattributes, batch]
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, k8sattributes, batch]
      exporters: [loki]
