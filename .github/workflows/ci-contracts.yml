name: CI — Contracts

on:
  push:
    branches: [main, develop]
    paths:
      - "contracts/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "contracts/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: contracts

jobs:
  compile-test:
    name: Compile & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run contract tests with coverage
        run: npx hardhat coverage

      - name: Enforce branch coverage ≥ 90%
        run: |
          BRANCH_COV=$(cat coverage/coverage-summary.json | jq '.total.branches.pct')
          echo "Branch coverage: ${BRANCH_COV}%"
          if (( $(echo "$BRANCH_COV < 90" | bc -l) )); then
            echo "ERROR: Branch coverage ${BRANCH_COV}% is below required 90%"
            exit 1
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contracts-coverage
          path: contracts/coverage/
          retention-days: 7

  slither:
    name: Slither Static Analysis
    runs-on: ubuntu-latest
    needs: compile-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Install contract dependencies
        run: npm ci

      - name: Set up Python (for Slither)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Slither
        run: pip install slither-analyzer

      - name: Run Slither (fail on HIGH/CRITICAL)
        run: |
          slither . \
            --json slither-report.json \
            --filter-paths "node_modules|test" \
            --fail-high \
            --hardhat-artifacts-directory artifacts \
            --solc-remaps "@openzeppelin=node_modules/@openzeppelin"

      - name: Upload Slither report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: slither-report
          path: contracts/slither-report.json
          retention-days: 30
