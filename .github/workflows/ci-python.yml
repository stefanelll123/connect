name: CI — Python

on:
  push:
    branches: [main, develop]
    paths:
      - "services/**"
      - "libs/**"
      - "tests/**"
      - "pyproject.toml"
  pull_request:
    branches: [main, develop]
    paths:
      - "services/**"
      - "libs/**"
      - "tests/**"
      - "pyproject.toml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install ruff mypy types-passlib types-python-jose

      - name: Ruff — lint
        run: ruff check services/ libs/

      - name: Ruff — format check
        run: ruff format --check services/ libs/

      - name: Mypy — type check
        run: mypy services/ libs/ --ignore-missing-imports

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel
          POSTGRES_DB: sentinel_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U sentinel"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://sentinel:sentinel@localhost:5432/sentinel_test
          REDIS_URL: redis://localhost:6379/0
          SENTINEL_ENV: test
        run: |
          pytest tests/unit tests/integration \
            --cov=services --cov=libs \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml

  sca:
    name: Software Composition Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit (block HIGH/CRITICAL)
        run: pip-audit --requirement <(pip install -e . --dry-run -q 2>/dev/null | grep "^  " | awk '{print $1}') --fail-on HIGH
        # Fail the build on HIGH or CRITICAL severity findings
        continue-on-error: false
