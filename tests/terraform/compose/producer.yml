# Producer EC2 Docker Compose
# Runs: sentinel-producer + mock-backend (the real backend being wrapped)
#
# All env vars injected via /opt/connect/.env.producer by producer-setup.sh

services:
  sentinel-producer:
    image: ${DOCKER_HUB_USERNAME}/connect-sentinel:${IMAGE_TAG}
    environment:
      SENTINEL_ROLE: producer
      BACKEND_URL: http://mock-backend:9000
      INBOUND_URL: http://${PRODUCER_PRIVATE_IP}:8080
      SERVICE_ID: aws-sentinel-producer
      SENTINEL_ENV: dev
      SENTINEL_HOME: /data
      SENTINEL_PASSPHRASE: ${SENTINEL_PASSPHRASE}
      DATABASE_URL: postgresql+asyncpg://sentinel_user:${POSTGRES_PASSWORD}@${HUB_PRIVATE_IP}:5432/sentinel_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@${HUB_PRIVATE_IP}:6379/1
      BLOCKCHAIN_RPC_URL: http://${HUB_PRIVATE_IP}:8545
      BLOCKCHAIN_CHAIN_ID: "31337"
      BLOCKCHAIN_INTEGRATION: "true"
      CONTRACT_ISSUER_REGISTRY: ${CONTRACT_ISSUER_REGISTRY}
      CONTRACT_TRUST_POLICY_REGISTRY: ${CONTRACT_TRUST_POLICY_REGISTRY}
      CONTRACT_STATUS_REGISTRY: ${CONTRACT_STATUS_REGISTRY}
      CONTRACT_SERVICE_REGISTRY: ${CONTRACT_SERVICE_REGISTRY}
      DISCOVERY_URL: http://${HUB_PRIVATE_IP}:8000
      SECRET_STORAGE_MASTER_KEY: ${SECRET_STORAGE_MASTER_KEY}
      SENTINEL_SECRET_BACKEND: local
      SECRET_STORAGE_PATH: /data/secrets
      SERVICE_NAME: sentinel-producer
      SERVICE_VERSION: "0.1.0"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://${HUB_PRIVATE_IP}:4318
      OTEL_ENABLED: "true"
      DEPLOYMENT_ENVIRONMENT: loadtest
      SESSION_TOKEN_TTL: "900"
      SESSION_NONCE_TTL: "60"
      SESSION_RATE_LIMIT_PER_MINUTE: "300"
      ENROLLMENT_TOKEN: ${ENROLLMENT_TOKEN_PRODUCER}
    ports:
      - "8080:8080"
      - "8100:8080"
    volumes:
      - sentinel_producer_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health/live')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - producer_net

  mock-backend:
    image: python:3.12-slim
    command:
      - python
      - "-c"
      - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json

          class Handler(BaseHTTPRequestHandler):
              def do_GET(self): self._respond()
              def do_POST(self): self._respond()
              def do_PUT(self): self._respond()
              def do_PATCH(self): self._respond()
              def do_DELETE(self): self._respond()
              def _respond(self):
                  body = json.dumps({"status": "ok", "path": self.path, "method": self.command}).encode()
                  self.send_response(200)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)
              def log_message(self, fmt, *args): pass

          print("Mock backend listening on :9000", flush=True)
          HTTPServer(("0.0.0.0", 9000), Handler).serve_forever()
    ports:
      - "9000:9000"
    restart: unless-stopped
    networks:
      - producer_net

volumes:
  sentinel_producer_data:

networks:
  producer_net:
    name: producer_net
