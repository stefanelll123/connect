<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Governance Admin{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; }
    .navbar-brand { font-weight: 700; letter-spacing: .4px; }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    .mono { font-family: 'Courier New', monospace; font-size: .85em; word-break: break-all; }
    .blurred { filter: blur(5px); transition: filter .25s; cursor: pointer; user-select: none; }
    .blurred:hover, .blurred:focus { filter: blur(0); }
    .status-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; }
    .dot-green { background: #198754; }
    .dot-red   { background: #dc3545; }
    .tx-link   { font-family: monospace; font-size: .8em; color: #6c757d; }
    .tx-link:hover { color: #0d6efd; }
    .nav-link.active { font-weight: 600; }
    th { white-space: nowrap; }
    .copyable { cursor: pointer; position: relative; }
    .copyable:hover { color: #0d6efd !important; }
    .copyable:hover::after { content: ' \f44e'; font-family: 'bootstrap-icons'; font-size:.8em; margin-left:4px; color:#0d6efd; }
    .copy-toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      background: #198754; color: #fff; padding: 8px 18px;
      border-radius: 6px; font-size: .9em; opacity: 0;
      transition: opacity .2s;
      pointer-events: none;
    }
    .copy-toast.show { opacity: 1; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">
      <i class="bi bi-shield-lock-fill text-warning me-2"></i>Governance Admin
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">
            <i class="bi bi-house me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/bootstrap' %}active{% endif %}" href="/bootstrap">
            <i class="bi bi-key me-1"></i>Bootstrap
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/issuers' %}active{% endif %}" href="/issuers">
            <i class="bi bi-person-badge me-1"></i>Issuers
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/policies' %}active{% endif %}" href="/policies">
            <i class="bi bi-file-earmark-ruled me-1"></i>Trust Policies
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/services' %}active{% endif %}" href="/services">
            <i class="bi bi-hdd-network me-1"></i>Services
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/audit' %}active{% endif %}" href="/audit">
            <i class="bi bi-list-check me-1"></i>Audit Log
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 pb-5">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Global copy-to-clipboard -->
<div class="copy-toast" id="copyToast"><i class="bi bi-clipboard-check me-1"></i>Copied!</div>
<script>
(function () {
  const toast = document.getElementById('copyToast');
  let hideTimer;

  function showToast() {
    toast.classList.add('show');
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => toast.classList.remove('show'), 1500);
  }

  document.addEventListener('click', function (e) {
    const el = e.target.closest('[data-copy]');
    if (!el) return;
    e.preventDefault();
    const text = el.dataset.copy || el.textContent.trim();
    navigator.clipboard.writeText(text).then(showToast);
  });
})();
</script>

{% block scripts %}{% endblock %}
</body>
</html>
